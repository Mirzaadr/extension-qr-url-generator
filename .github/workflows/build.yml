name: Build Extension

permissions:
  contents: write

on:
  push:
    # branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run build

      - name: Zip extension
        run: |
          cd dist
          zip -r ../qr-extension.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: qr-extension
          path: qr-extension.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qr-extension

      - uses: softprops/action-gh-release@v2
        with:
          files: qr-extension.zip